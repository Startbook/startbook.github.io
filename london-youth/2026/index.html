<style>
  body {

  }

  /* Style the tab */
  .tab {
    display: flex;
    border: none;
    background-color: #202023;
  }

  /* Style the buttons inside the tab */
  .tab button {
    background-color: inherit;
    flex: 1;
    border: 2px black solid;
    border-top: 2px black solid;
    outline: none;
    cursor: pointer;
    padding: 10px 10px;
    transition: 0.3s;
    font-size: 20px;
    color: #efefef;
  }

  /* Change background color of buttons on hover */
  .tab button:hover {
    background-color: #00c6db;
    color: 'white';
  }

  /* Create an active/current tablink class */
  .tab button.active {
    background-color: #482961;
    color: 'white';
    border: 2px white solid;
    /* font-weight: bold; */
  }

  @media only screen and (max-width: 600px) {
    .mobile-header {
      text-align: center !important;
      font-size: 10px !important;
    }
    .mobile-header-text {
      text-align: center !important;
      font-size: 18px !important;
    }
    .tab-label { display: none; }
    .tab button { font-size: 18px !important; }
  }

  /* Style the tab content */
  .tabcontent {
    padding: 0;
    border-top: none;
    position: relative;
  }

  .lock-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #202023;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .lock-box {
    text-align: center;
    color: white;
    padding: 40px;
    max-width: 400px;
  }

  .lock-box i {
    font-size: 48px;
    color: #888;
    margin-bottom: 20px;
    display: block;
  }

  .lock-box h2 {
    margin: 0 0 8px 0;
    font-size: 22px;
    font-weight: 600;
  }

  .lock-box p {
    margin: 0 0 20px 0;
    color: #aaa;
    font-size: 14px;
  }

  .lock-box input {
    padding: 10px 14px;
    font-size: 16px;
    border: 2px solid #555;
    border-radius: 6px;
    background: #2a2a2d;
    color: white;
    outline: none;
    width: 200px;
    text-align: center;
  }

  .lock-box input:focus {
    border-color: #482961;
  }

  .lock-box button {
    margin-left: 8px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #482961;
    color: white;
    cursor: pointer;
  }

  .lock-box button:hover {
    background: #5a3580;
  }

  .lock-box .error-msg {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
  }
</style>

<script>
  var tabConfig = {};
  var configPassword = '';
  var unlockedTabs = {};

  fetch('config.json')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      tabConfig = config.tabs || {};
      configPassword = config.password || '';
    });

  function resizeContent() {
    var header = document.querySelector('.header');
    var tab = document.querySelector('.tab');
    var available = window.innerHeight - header.offsetHeight - tab.offsetHeight;
    var contents = document.getElementsByClassName('tabcontent');
    for (var i = 0; i < contents.length; i++) {
      contents[i].style.height = available + 'px';
    }
    var iframes = document.querySelectorAll('.tabcontent iframe');
    for (var i = 0; i < iframes.length; i++) {
      iframes[i].style.width = '100%';
      iframes[i].style.height = available + 'px';
    }
  }
  window.addEventListener('load', resizeContent);
  window.addEventListener('resize', resizeContent);

  function showLockOverlay(tabId) {
    // Remove any existing overlay
    var existing = document.getElementById('lock-' + tabId);
    if (existing) { existing.remove(); }

    var tabEl = document.getElementById(tabId);
    var overlay = document.createElement('div');
    overlay.className = 'lock-overlay';
    overlay.id = 'lock-' + tabId;
    overlay.innerHTML =
      '<div class="lock-box">' +
        '<i class="bi bi-lock-fill"></i>' +
        '<h2>This tab is locked</h2>' +
        '<p>Enter the password to view this content</p>' +
        '<div>' +
          '<input type="password" id="pw-' + tabId + '" placeholder="Password" onkeydown="if(event.key===\'Enter\')unlockTab(\'' + tabId + '\')" />' +
          '<button onclick="unlockTab(\'' + tabId + '\')">Unlock</button>' +
        '</div>' +
        '<div class="error-msg" id="err-' + tabId + '"></div>' +
      '</div>';
    tabEl.appendChild(overlay);
    setTimeout(function() { document.getElementById('pw-' + tabId).focus(); }, 50);
  }

  function unlockTab(tabId) {
    var input = document.getElementById('pw-' + tabId);
    var error = document.getElementById('err-' + tabId);
    if (input.value.toLowerCase() === configPassword.toLowerCase()) {
      unlockedTabs[tabId] = true;
      document.getElementById('lock-' + tabId).remove();
    } else {
      error.textContent = 'Incorrect password. Please try again.';
      input.value = '';
      input.focus();
    }
  }

  function openCity(evt, cityName) {
    var i, tabcontent, tablinks
    tabcontent = document.getElementsByClassName('tabcontent')
    for (i = 0; i < tabcontent.length; i++) {
      tabcontent[i].style.display = 'none'
    }
    tablinks = document.getElementsByClassName('tablinks')
    for (i = 0; i < tablinks.length; i++) {
      tablinks[i].className = tablinks[i].className.replace(' active', '')
    }
    document.getElementById(cityName).style.display = 'block'
    evt.currentTarget.className += ' active'

    // Show lock overlay if tab is locked
    if (tabConfig[cityName] && tabConfig[cityName].locked && !unlockedTabs[cityName]) {
      showLockOverlay(cityName);
    }
  }
</script>
