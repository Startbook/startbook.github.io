<!doctype html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Startbook - Summer Skills Grants 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<style>
  body {
    font-family: Helvetica, Arial, sans-serif;
  }

  /* Style the tab */
  .tab {
    display: flex;
    border: none;
    background-color: #202023;
  }

  /* Style the buttons inside the tab */
  .tab button {
    background-color: inherit;
    flex: 1;
    border: 2px black solid;
    border-top: 2px black solid;
    outline: none;
    cursor: pointer;
    padding: 10px 10px;
    transition: 0.3s;
    font-size: 20px;
    color: #efefef;
  }

  /* Change background color of buttons on hover */
  .tab button:hover {
    background-color: #00c6db;
    color: 'white';
  }

  /* Create an active/current tablink class */
  .tab button.active {
    background-color: #482961;
    color: 'white';
    border: 2px white solid;
    /* font-weight: bold; */
  }

  @media only screen and (max-width: 600px) {
    .mobile-header {
      text-align: center !important;
      font-size: 10px !important;
    }
    .mobile-header-text {
      text-align: center !important;
      font-size: 18px !important;
    }
    .tab-label { display: none; }
    .tab button { font-size: 18px !important; }
    #side-by-side iframe { width: 100% !important; height: 50% !important; display: block; }
  }

  /* Style the tab content */
  .tabcontent {
    padding: 0;
    border-top: none;
    position: relative;
  }

  .tabcontent .loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    bottom: 0;
    background-color: #202023;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .tabcontent .loading-overlay p {
    color: #ccc;
    font-size: 1rem;
    margin-top: 10px;
  }

  .lock-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #202023;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .lock-box {
    text-align: center;
    color: white;
    padding: 40px;
    max-width: 400px;
  }

  .lock-box i {
    font-size: 48px;
    color: #888;
    margin-bottom: 20px;
    display: block;
  }

  .lock-box h2 {
    margin: 0 0 8px 0;
    font-size: 22px;
    font-weight: 600;
  }

  .lock-box p {
    margin: 0 0 20px 0;
    color: #aaa;
    font-size: 14px;
  }

  .lock-box input {
    padding: 10px 14px;
    font-size: 16px;
    border: 2px solid #555;
    border-radius: 6px;
    background: #2a2a2d;
    color: white;
    outline: none;
    width: 200px;
    max-width: 80vw;
    text-align: center;
    display: block;
    margin: 0 auto 12px auto;
  }

  .lock-box input:focus {
    border-color: #482961;
  }

  .lock-box button {
    padding: 10px 30px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #482961;
    color: white;
    cursor: pointer;
    display: block;
    margin: 0 auto;
  }

  .lock-box button:hover {
    background: #5a3580;
  }

  .lock-box .error-msg {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 12px;
    min-height: 20px;
  }
</style>

<body style="margin: 0; height: 100%; width: 100%; background-color: black">
  <div class="header" style="background-color: #482961; padding: 8px 15px; text-align: center; color: white;">
    <h1 style="margin: 5px 0 0 0; font-size: clamp(20px, 3vw, 32px); font-weight: 600;" class="mobile-header-text">
      <img

        height="30px"

        alt="London Youth" />
      Summer Skills Grants
    </h1>
    <div style="margin: 0 auto 8px auto; text-align: center; display: flex; align-items: center; justify-content: center; gap: 25px;">
      <span style="font-size: clamp(10px, 1.5vw, 16px); font-weight: normal; font-style: italic; color: white;">Powered by</span>
      <img src="../../assets/img/clients/cvc-logo-white-rectangle.png" height="32px" alt="CVC" />
      <img src="../../london-youth-summer-skills-grants/assets/img/infosys-logo.png" height="32px" alt="Infosys" />
      <img src="../../london-youth-summer-skills-grants/assets/img/lseg-logo.png" height="32px" alt="LSEG Foundation" />

    <button class="tablinks" onclick="openCity(event, 'spreadsheet')"><i class="bi bi-table"></i><span class="tab-label"> Spreadsheet</span></button>

    <button class="tablinks" onclick="openCity(event, 'gallery')"><i class="bi bi-grid"></i><span class="tab-label"> Gallery</span></button>

    <button class="tablinks" onclick="openCity(event, 'scoring')"><i class="bi bi-pencil-square"></i><span class="tab-label"> Scoring</span></button>

    <button class="tablinks" onclick="openCity(event, 'side-by-side')"><i class="bi bi-layout-split"></i><span class="tab-label"> Side-by-side</span></button>

    <button class="tablinks" onclick="openCity(event, 'results')"><i class="bi bi-trophy"></i><span class="tab-label"> Results</span></button>
  </div>

  <div id="slides" class="tabcontent" style="display: none">

    <iframe

      frameborder="0"
      width="1440"
      height="839"
      style="display: block; margin: auto"
      allowfullscreen="true"

      webkitallowfullscreen="true"

  </div>

  <div id="attendees" class="tabcontent" style="display: none">

      <img src="../../assets/img/loading.gif" height="50px" width="50px" />

    </div>
    <iframe

      src="https://airtable.com/embed/app6FvPARDKaDRKwu/shrUDIiVMoAoRLw4I?viewControls=on"

    <div id="loading-spreadsheet" class="loading-overlay">
      <img src="../../assets/img/loading.gif" height="50px" width="50px" />
      <p style="color: #ccc; font-size: 1rem; margin: 10px 0 0 0;">Loading...</p>
    </div>
    <iframe
      class="airtable-embed"
      src="https://airtable.com/embed/app6FvPARDKaDRKwu/shrx6AFbG5EOjOnNy?viewControls=on"
      frameborder="0"
      onmousewheel=""
      width="100%"
      height="100%"
      loading="lazy"

  <div id="gallery" class="tabcontent" style="display: none">

      <p style="color: #ccc; font-size: 1rem; margin: 10px 0 0 0;">Loading...</p>
    </div>
    <iframe
      class="airtable-embed"
      src="https://airtable.com/embed/app6FvPARDKaDRKwu/shryveBBqgtRVj588/tblon7jDpWeYpLNE3?viewControls=on"
      frameborder="0"
      onmousewheel=""

  <div id="scoring" class="tabcontent" style="display: none">
    <div id="loading-scoring" class="loading-overlay">
      <img src="../../assets/img/loading.gif" height="50px" width="50px" />

</body>

<script>
  var tabConfig = {};
  var configPassword = '';
  var unlockedTabs = {};

  function resizeContent() {
    var header = document.querySelector('.header');
    var tab = document.querySelector('.tab');
    var available = window.innerHeight - header.offsetHeight - tab.offsetHeight;
    var contents = document.getElementsByClassName('tabcontent');
    for (var i = 0; i < contents.length; i++) {
      contents[i].style.height = available + 'px';
    }
    var iframes = document.querySelectorAll('.tabcontent iframe');
    for (var i = 0; i < iframes.length; i++) {
      // Don't override width on side-by-side tab iframes
      if (!iframes[i].closest('#side-by-side')) {
        iframes[i].style.width = '100%';
      }
      iframes[i].style.height = available + 'px';
    }
    // Refocus password input if a lock overlay is visible
    var activePw = document.querySelector('.lock-overlay:not([style*="display: none"]) input[type="password"]');
    if (activePw) activePw.focus();
  }
  resizeContent();
  window.addEventListener('load', resizeContent);
  window.addEventListener('resize', resizeContent);

  // Prevent iframes from stealing focus when lock overlay is showing
  window.addEventListener('blur', function() {
    var activePw = document.querySelector('.lock-overlay input[type="password"]');
    if (activePw && activePw.closest('.tabcontent').style.display !== 'none') {
      setTimeout(function() { activePw.focus(); }, 0);
    }
  });

  function showLockOverlay(tabId) {
    // Remove any existing overlay
    var existing = document.getElementById('lock-' + tabId);
    if (existing) { existing.remove(); }

    var tabEl = document.getElementById(tabId);
    var overlay = document.createElement('div');
    overlay.className = 'lock-overlay';
    overlay.id = 'lock-' + tabId;
    overlay.innerHTML =
      '<div class="lock-box">' +
        '<i class="bi bi-lock-fill"></i>' +
        '<h2>This tab is locked</h2>' +
        '<p>Enter the password to view this content</p>' +
        '<div>' +
          '<input type="password" id="pw-' + tabId + '" placeholder="Password" onkeydown="if(event.key===\'Enter\')unlockTab(\'' + tabId + '\')" />' +
          '<button onclick="unlockTab(\'' + tabId + '\')">Unlock</button>' +
        '</div>' +
        '<div class="error-msg" id="err-' + tabId + '"></div>' +
      '</div>';
    tabEl.appendChild(overlay);
    setTimeout(function() { document.getElementById('pw-' + tabId).focus(); }, 50);
  }

  function unlockTab(tabId) {
    var input = document.getElementById('pw-' + tabId);
    var error = document.getElementById('err-' + tabId);
    if (input.value.toLowerCase() === configPassword.toLowerCase()) {
      // Unlock all locked tabs
      for (var id in tabConfig) {
        if (tabConfig[id].locked) {
          unlockedTabs[id] = true;
          var overlay = document.getElementById('lock-' + id);
          if (overlay) overlay.remove();
        }
      }
    } else {
      error.textContent = 'Incorrect password. Please try again.';
      input.value = '';
      input.focus();
    }
  }

  function openCity(evt, cityName) {
    var i, tabcontent, tablinks
    tabcontent = document.getElementsByClassName('tabcontent')
    for (i = 0; i < tabcontent.length; i++) {
      tabcontent[i].style.display = 'none'
    }
    tablinks = document.getElementsByClassName('tablinks')
    for (i = 0; i < tablinks.length; i++) {
      tablinks[i].className = tablinks[i].className.replace(' active', '')
    }
    document.getElementById(cityName).style.display = 'block'

    // Set active button
    if (evt) {
      evt.currentTarget.className += ' active';
    } else {
      // Find the button for this tab and mark active
      document.querySelectorAll('.tablinks').forEach(function(btn) {
        if (btn.getAttribute('onclick').indexOf("'" + cityName + "'") !== -1) {
          btn.className += ' active';
        }
      });
    }

    // Update URL hash
    history.replaceState(null, null, '#' + cityName);

    // Show lock overlay if tab is locked
    if (tabConfig[cityName] && tabConfig[cityName].locked && !unlockedTabs[cityName]) {
      showLockOverlay(cityName);
    }
  }

  // On page load, open tab from URL hash
  function openTabFromHash() {
    var hash = window.location.hash.replace('#', '');
    if (hash && document.getElementById(hash)) {
      openCity(null, hash);
    } else {
      openCity(null, 'spreadsheet');
    }
  }

  // Run after config loads
  fetch('config.json')
    .then(function(r) { return r.json(); })
    .then(function(config) {
      tabConfig = config.tabs || {};
      configPassword = config.password || '';
      // Set scoring sheet iframe URLs from config
      if (config.scoringSheetUrl) {
        document.querySelectorAll('.scoring-sheet-iframe').forEach(function(iframe) {
          iframe.src = config.scoringSheetUrl;
        });
      }
      if (config.resultsSheetUrl) {
        document.querySelectorAll('.results-sheet-iframe').forEach(function(iframe) {
          iframe.src = config.resultsSheetUrl;
        });
      }
    })
    .then(openTabFromHash);
</script>
